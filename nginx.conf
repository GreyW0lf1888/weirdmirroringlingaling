events {}

http {
    server {
        # Render injects a dynamic port into the $PORT environment variable.
        # Nginx must listen on the variable or a default port Render routes to (usually 10000).
        listen 10000;
        server_name localhost;

        location / {
            proxy_pass https://bloxd.io;
            
            # Forward proxy headers
            proxy_set_header Host bloxd.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable WebSockets for multiplayer connectivity
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Bypass security blocks
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
        }
    }
}
