events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # 1. Serves your local index.html entry point
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # 2. Main Game Proxy Endpoint
        location /game-assets/ {
            proxy_pass https://math.wales; 
            proxy_set_header Host math.wales;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strip origin locks to let the iframe initialize cleanly
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header X-Frame-Options;
        }

        # 3. ROOT ASSET TRAPS (Fixes the broken asset loading error)
        # Matches all top-level directories the game requests from the root domain
        location ~* ^/(assets|js|css|textures|sound|fonts|locales|src|lib)/ {
            proxy_pass https://math.wales;
            proxy_set_header Host math.wales;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Prevent latency spikes on heavy 3D assets via buffering
            proxy_buffering on;
            expires 1d;
        }
    }
}
