# =========================================================================
# UNIVERSAL GAME PROXY & ASSET TUNNEL CONFIGURATION
# Optimized for WebGL, WebWorkers, SharedArrayBuffers, and Cross-Origin Media
# =========================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept        on;
    use                 epoll;
}

http {
    # ---------------------------------------------------------------------
    # Core Media Types & Stream Settings
    # ---------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Add support for critical WebGL/WASM binary structures
    types {
        application/wasm                      wasm;
        application/x-web-app-manifest+json   webapp;
        text/cache-manifest                   appcache;
    }

    # Logging Framework (Aggressive optimization for throughput tracking)
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Network I/O Engine Optimization
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   120;
    keepalive_requests  1000;
    types_hash_max_size 4096;

    # Gzip Compression Framework (Accelerates game asset delivery arrays)
    gzip            on;
    gzip_static     on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/x-javascript
        text/css
        text/javascript
        text/xml;

    # ---------------------------------------------------------------------
    # Global Upstream Clusters
    # ---------------------------------------------------------------------
    upstream game_core {
        server math.wales:443;
        keepalive 128;
    }
        upstream game_engine_hub {
        server math.wales:443 max_fails=0;
        keepalive 128;
    }


    # DNS Resolver mapping for dynamic outbound cross-origin web image parsing
    resolver 1.1.1.1 8.8.8.8 valid=600s ipv6=off;
    resolver_timeout 10s;

    # ---------------------------------------------------------------------
    # Server Gateway Architecture
    # ---------------------------------------------------------------------
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  localhost;

        # -----------------------------------------------------------------
        # SCENARIO 1: Local Application / Portal Gateway Layout
        # -----------------------------------------------------------------
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
            
            # Allow cross-origin isolation frames (Crucial for heavy 3D rendering engines)
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }

        # -----------------------------------------------------------------
        # SCENARIO 2: Primary Game Core Engine Pipeline Tunnel
        # -----------------------------------------------------------------
          location /game-assets/ {
            proxy_pass https://game_engine_hub/;
            
            # --- FIXES SSL ALERT NUMBER 40 (SNI Handshake) ---
            proxy_ssl_server_name on;
            proxy_ssl_name math.wales;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            # -------------------------------------------------

            proxy_set_header Host math.wales;
            proxy_set_header Origin https://math.wales;
            proxy_set_header Referer https://math.wales;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_hide_header Content-Security-Policy;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header X-Content-Type-Options;
            # Re-scope dynamic domain cookie domains instantly
            proxy_cookie_domain math.wales $host;
        }

        # -----------------------------------------------------------------
        # SCENARIO 3: Custom Image / Cross-Origin Media Web Fetcher
        # Handles user-injected URLs, canvas textures, or map icons anywhere on the web
        # Usage path: ://yourdomain.com
        # -----------------------------------------------------------------
        location /fetch-media/ {
            # Extract the raw url parameter targeting outside networks
            if ($arg_url ~* "^https?://(.*)") {
                set $target_url $arg_url;
            }

            proxy_pass $target_url;
            
            # Dynamic HTTP protocol configuration properties
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # Force target cross-origin headers to open up to canvas read methods
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # -----------------------------------------------------------------
        # SCENARIO 4: Multiplayer WebSocket & Event Streams Tunneling
        # Fixes infinite loading connection hangs on lobby rooms
        # -----------------------------------------------------------------
    location ~* \.(ws|io|socket|transport)$ {
            # Route to the hub containing max_fails=0 protection
            proxy_pass https://game_engine_hub;
            proxy_http_version 1.1;
            
            # --- FIXES MULTIPLAYER SSL ALERT 40 HANGS ---
            proxy_ssl_server_name on;
            proxy_ssl_name math.wales;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            # ---------------------------------------------

            # Route header upgrades dynamically for live streaming
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Match strict upstream headers to satisfy security checkers
            proxy_set_header Host math.wales;
            proxy_set_header Origin https://math.wales;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Long-running persistent network link timeout extensions (7 days)
            proxy_connect_timeout 7d;
            proxy_send_timeout    7d;
            proxy_read_timeout    7d;
        }
        # -----------------------------------------------------------------
        # SCENARIO 5: Universal Root Asset Directory Traps
        # Catches all relative subfolder references issued by client loaders
        # -----------------------------------------------------------------
              location ~* ^/(assets|js|css|textures|sound|fonts|locales|src|lib|wasm|chunks|api|shared|build|maps|data)/ {
            proxy_pass https://game_engine_hub;
            
            # --- FIXES SSL ALERT NUMBER 40 FOR ASSETS ---
            proxy_ssl_server_name on;
            proxy_ssl_name math.wales;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            # --------------------------------------------

            proxy_set_header Host math.wales;
            proxy_set_header Origin https://math.wales;
            proxy_set_header Referer https://math.wales;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_buffering    on;
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
            proxy_busy_buffers_size 256k;
            
            expires 7d;
            add_header Cache-Control "public, no-transform";
            
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header X-Frame-Options;
        }

        # -----------------------------------------------------------------
        # SCENARIO 6: Deep Wildcard Binary / Hash Extension Capture
        # Catch-all trap for unmapped static game extensions or background chunks
        # -----------------------------------------------------------------
           location ~* \.(js|wasm|json|png|jpg|jpeg|gif|ico|mp3|ogg|woff2|data|bin|unityweb|pack|svg|mp4)$ {
            proxy_pass https://game_engine_hub;
            
            # --- FIXES SSL ALERT NUMBER 40 FOR EXTENSIONS ---
            proxy_ssl_server_name on;
            proxy_ssl_name math.wales;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            # ------------------------------------------------

            proxy_set_header Host math.wales;
            proxy_set_header Origin https://math.wales;
            proxy_set_header Referer https://math.wales;
            
            proxy_buffering on;
            expires 30d;
            
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header X-Frame-Options;
        }
    }
